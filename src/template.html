<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Weather App </title>
</head>

<body>
    <div class="container">
        <div class="search-units">
            <input type="text" id="search" name="search" placeholder="What's the location ?">
            <div class="units">
                <button id="unit"> ℃ </button>
                <button id="unit"> °F </button>
            </div>
        </div>

        <div class="temp-details">
            <div class="left-side">
                <div class="city">
                    <!-- h3 for the city's name added dynamically -->
                </div>
                <img id="weather-icon">
                <div class="details">
                    <!-- h and p added dynamically-->
                </div>
            </div>
            <div class="right-side">
                <!-- p for the temperature added dynamically -->
            </div>
        </div>

        <div class="hum-wind-vis-press">
            <div class="humidity">
                <p> &#128167; HUMIDITY</p>
                <!-- p for the humidity added dynamically -->
            </div>
            <div class="wind">
                <p> &#128168; WIND</p>
                <!-- p for the wind added dynamically -->
            </div>
            <div class="visibility">
                <p> &#128065; VISIBILITY</p>
                <!-- p for the visibility added dynamically -->
            </div>
            <div class="pressure">
                <p> &#x1F550; PRESSURE</p>
                <!-- p for the pressure added dynamically -->
            </div>
        </div>

        <div class="forecast">
            <h3> 5-DAY FORECAST </h3>
            <div class="days">
                <!-- days items added dynamically-->
            </div>
        </div>
    </div>
</body>

</html>
